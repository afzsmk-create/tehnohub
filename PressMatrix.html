<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PressMatrix | ZSMK Tech</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { 
            background-color: #f1f5f9; 
            font-family: 'Inter', system-ui, -apple-system, sans-serif; 
        }
        .card { 
            background: white; 
            border-radius: 16px; 
            box-shadow: 0 4px 20px -2px rgba(0,0,0,0.03); 
            border: 1px solid #e2e8f0; 
        }
        input[type="range"] { 
            height: 6px; 
            background: #e2e8f0; 
            border-radius: 10px; 
            appearance: none; 
            outline: none;
        }
        input[type="range"]::-webkit-slider-thumb { 
            appearance: none; 
            width: 18px; 
            height: 18px; 
            background: #4f46e5; 
            border-radius: 50%; 
            cursor: pointer; 
            border: 3px solid white; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.2); 
            transition: transform 0.1s;
        }
        input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.1);
        }
        select, input[type="number"] {
            transition: all 0.2s;
        }
        select:focus, input[type="number"]:focus {
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }
    </style>
</head>
<body class="p-3 md:p-6 flex flex-col min-h-screen">
    <div id="app" class="max-w-6xl mx-auto w-full">
        <header class="mb-6 text-center">
            <div class="flex items-center justify-center space-x-3 mb-1">
                <svg class="w-8 h-8 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 002-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
                <h1 class="text-3xl font-black bg-clip-text text-transparent bg-gradient-to-r from-indigo-600 to-blue-500 tracking-tight">
                    PressMatrix
                </h1>
            </div>
            <p class="text-slate-500 font-semibold text-xs tracking-widest uppercase">Расчёт давления прессования</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-5">
            <div class="lg:col-span-7 space-y-5">
                
                <div class="card p-6">
                    <div class="flex items-center space-x-3 mb-4">
                        <div class="p-2 bg-indigo-50 rounded-lg text-indigo-600">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                        </div>
                        <h2 class="text-lg font-bold text-slate-800">Оборудование</h2>
                    </div>
                    <select id="pressSelect" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 font-medium outline-none text-slate-700 cursor-pointer">
                        <option value="press1">Пресс 3500 x 1300 (8 цил. Ø80)</option>
                        <option value="press2">Пресс 6000 x 1500 (4 цил. Ø70)</option>
                    </select>
                </div>

                <div class="card p-6">
                    <div class="flex items-center space-x-3 mb-6">
                        <div class="p-2 bg-blue-50 rounded-lg text-blue-600">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4"></path></svg>
                        </div>
                        <h2 class="text-lg font-bold text-slate-800">Габариты заготовки</h2>
                    </div>
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-x-10 gap-y-6">
                        <div class="space-y-3">
                            <div class="flex justify-between items-end">
                                <label class="text-xs font-bold text-slate-500 uppercase tracking-wider">Длина (мм)</label>
                                <input type="number" id="lengthInput" class="w-24 text-right font-black text-xl text-indigo-600 bg-transparent border-b-2 border-slate-200 outline-none pb-1">
                            </div>
                            <input type="range" id="lengthSlider" min="100" step="100" class="w-full">
                        </div>

                        <div class="space-y-3">
                            <div class="flex justify-between items-end">
                                <label class="text-xs font-bold text-slate-500 uppercase tracking-wider">Ширина (мм)</label>
                                <input type="number" id="widthInput" class="w-24 text-right font-black text-xl text-indigo-600 bg-transparent border-b-2 border-slate-200 outline-none pb-1">
                            </div>
                            <input type="range" id="widthSlider" min="100" step="100" class="w-full">
                        </div>
                    </div>

                    <div id="areaWarning" class="hidden mt-6 p-3 bg-amber-50 text-amber-800 rounded-xl text-sm border border-amber-200 flex items-center space-x-3">
                        <svg class="w-6 h-6 text-amber-500 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
                        <span><strong>Заполнение менее 50%.</strong> Распределите компенсационные панели по краям плит.</span>
                    </div>
                </div>

                <div class="card p-6">
                    <div class="flex items-center space-x-3 mb-5">
                        <div class="p-2 bg-emerald-50 rounded-lg text-emerald-600">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"></path></svg>
                        </div>
                        <h2 class="text-lg font-bold text-slate-800">Технология</h2>
                    </div>
                    
                    <div class="space-y-5">
                        <div class="space-y-2">
                            <label class="text-xs font-bold text-slate-400 uppercase">Операция</label>
                            <select id="presetSelect" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 text-sm font-medium outline-none text-slate-700 cursor-pointer">
                                <option value="honeycomb_assembly">Алюминиевая сотовая панель</option>
                                <option value="veneer_on_panel">Деревянный шпон (на готовую панель)</option>
                                <option value="hpl_on_honeycomb">HPL пластик (напрямую на соту)</option>
                                <option value="stone_on_honeycomb">Каменный шпон (напрямую на соту)</option>
                                <option value="custom">Ручной режим (свои настройки)</option>
                            </select>
                        </div>

                        <div id="honeycombParams" class="flex space-x-2 transition-all">
                            <div class="w-1/3 space-y-2">
                                <label class="text-[10px] font-bold text-slate-400 uppercase">Ячейка</label>
                                <select id="cellSize" class="w-full bg-slate-50 border border-slate-200 rounded-lg p-2.5 text-xs font-medium outline-none">
                                    <option value="6.3" selected>6.3 мм</option>
                                    <option value="9.5">9.5 мм</option>
                                    <option value="12.7">12.7 мм</option>
                                </select>
                            </div>
                            <div class="w-1/3 space-y-2">
                                <label class="text-[10px] font-bold text-slate-400 uppercase">Фольга</label>
                                <select id="foilThick" class="w-full bg-slate-50 border border-slate-200 rounded-lg p-2.5 text-xs font-medium outline-none">
                                    <option value="0.04">0.04 мм</option>
                                    <option value="0.045">0.045 мм</option>
                                    <option value="0.05" selected>0.05 мм</option>
                                </select>
                            </div>
                            <div class="w-1/3 space-y-2">
                                <label class="text-[10px] font-bold text-slate-400 uppercase">Алюминий (Лист)</label>
                                <select id="faceSheet" class="w-full bg-slate-50 border border-slate-200 rounded-lg p-2.5 text-xs font-medium outline-none">
                                    <option value="0.5">0.5 мм</option>
                                    <option value="0.7">0.7 мм</option>
                                    <option value="1.0" selected>1.0 мм</option>
                                    <option value="1.2">1.2 мм</option>
                                    <option value="1.5">1.5 мм</option>
                                    <option value="2.0">2.0 мм</option>
                                </select>
                            </div>
                        </div>

                        <div id="customPressureRow" class="hidden pt-4 border-t border-slate-100">
                            <label class="block text-sm font-bold text-slate-700 mb-3">
                                Целевое удельное: <span id="val_ud" class="text-indigo-600 text-lg">0.6</span> кг/см²
                            </label>
                            <input type="range" id="udPressure" min="0.1" max="2.0" step="0.1" value="0.6" class="w-full">
                        </div>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-5">
                <div class="card overflow-hidden h-full flex flex-col relative" style="background: radial-gradient(ellipse at 20% 0%, #1a1f35 0%, #0d1117 60%, #0a0e18 100%); border-color: #1e2a3a;">
                    <div class="absolute top-0 left-1/2 -translate-x-1/2 w-48 h-24 rounded-full blur-3xl opacity-20" style="background: #6366f1;"></div>

                    <div class="relative z-10 px-6 pt-5 pb-4 flex justify-between items-center" style="border-bottom: 1px solid rgba(255,255,255,0.06);">
                        <div>
                            <div class="text-[9px] font-bold uppercase tracking-[0.2em] mb-1" style="color:#4a5568;">S панели</div>
                            <div class="text-xl font-black text-white"><span id="res_area">0</span> <span class="text-sm font-medium" style="color:#4a5568;">м²</span></div>
                        </div>
                        <div class="w-px h-8" style="background: rgba(255,255,255,0.07);"></div>
                        <div>
                            <div class="text-[9px] font-bold uppercase tracking-[0.2em] mb-1" style="color:#4a5568;">Заполнение</div>
                            <div id="res_fill" class="text-xl font-black text-white">0%</div>
                        </div>
                        <div class="w-px h-8" style="background: rgba(255,255,255,0.07);"></div>
                        <div class="text-right">
                            <div class="text-[9px] font-bold uppercase tracking-[0.2em] mb-1" style="color:#4a5568;">P уд.</div>
                            <div class="text-xl font-black" style="color:#34d399;"><span id="res_ud">0</span> <span class="text-xs font-medium" style="color:#2d6a55;">кг/см²</span></div>
                        </div>
                    </div>

                    <div class="relative z-10 flex-grow flex flex-col items-center justify-center px-6 py-4">

                        <div id="gaugeNormal" class="w-full text-center relative">
                            <div class="text-[9px] font-bold uppercase tracking-[0.25em] mb-4" style="color:#4f6080;">На манометре</div>

                            <div class="relative mx-auto" style="width:100%; max-width:300px;">
                                <svg id="speedometer" viewBox="0 0 300 200" xmlns="http://www.w3.org/2000/svg" style="width:100%; overflow:visible;">
                                    <defs>
                                        <radialGradient id="dialGrad" cx="50%" cy="60%" r="50%">
                                            <stop offset="0%" stop-color="#1a2035"/>
                                            <stop offset="100%" stop-color="#0d1117"/>
                                        </radialGradient>
                                        <filter id="glowBlue" x="-50%" y="-50%" width="200%" height="200%">
                                            <feGaussianBlur stdDeviation="3" result="blur"/>
                                            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
                                        </filter>
                                        <filter id="glowRed" x="-50%" y="-50%" width="200%" height="200%">
                                            <feGaussianBlur stdDeviation="4" result="blur"/>
                                            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
                                        </filter>
                                        <filter id="needleGlow" x="-200%" y="-200%" width="500%" height="500%">
                                            <feGaussianBlur stdDeviation="2.5" result="blur"/>
                                            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
                                        </filter>
                                        <linearGradient id="needleGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                                            <stop offset="0%" stop-color="#ffffff"/>
                                            <stop offset="100%" stop-color="#c0c8e0"/>
                                        </linearGradient>
                                    </defs>

                                    <circle cx="150" cy="155" r="130" fill="url(#dialGrad)" opacity="0.6"/>

                                    <circle cx="150" cy="155" r="118" fill="none" stroke="#1e2a3a" stroke-width="1.5"/>
                                    <circle cx="150" cy="155" r="116" fill="none" stroke="#0a0e18" stroke-width="1"/>

                                    <path id="gaugeTrackBg" d="" fill="none" stroke="#151d2e" stroke-width="10" stroke-linecap="butt"/>

                                    <path id="gaugeTrackDangerGlow" d="" fill="none" stroke="#7f1d1d" stroke-width="14" stroke-linecap="butt" opacity="0.3"/>
                                    <path id="gaugeTrackDanger" d="" fill="none" stroke="#dc2626" stroke-width="10" stroke-linecap="butt" opacity="0.7"/>

                                    <path id="gaugeTrackFillGlow" d="" fill="none" stroke="#6366f1" stroke-width="16" stroke-linecap="butt" opacity="0.25" filter="url(#glowBlue)"/>
                                    <path id="gaugeTrackFill" d="" fill="none" stroke="#6366f1" stroke-width="10" stroke-linecap="butt"/>

                                    <g id="gaugeTicks"></g>

                                    <circle cx="150" cy="155" r="72" fill="#0d1117"/>
                                    <circle cx="150" cy="155" r="71" fill="none" stroke="#1a2540" stroke-width="1"/>

                                    <g id="needleGroup" transform="rotate(0, 150, 155)">
                                        <line x1="150" y1="155" x2="150" y2="60" stroke="#000" stroke-width="5" stroke-linecap="round" opacity="0.4" filter="url(#needleGlow)"/>
                                        <polygon id="needlePoly" points="150,62 147,155 153,155" fill="url(#needleGrad)" filter="url(#needleGlow)"/>
                                        <polygon points="150,62 147,155 153,155" fill="url(#needleGrad)"/>
                                    </g>

                                    <circle cx="150" cy="155" r="12" fill="#1a2035"/>
                                    <circle cx="150" cy="155" r="9" id="centerCap" fill="#6366f1"/>
                                    <circle cx="150" cy="155" r="4" fill="#0d1117"/>
                                    <circle cx="148" cy="153" r="1.5" fill="rgba(255,255,255,0.4)"/>
                                </svg>

                                <div class="absolute" style="bottom: 10%; left:50%; transform:translateX(-50%); text-align:center; pointer-events:none;">
                                    <div id="display_gauge" style="font-family:'Inter',sans-serif; font-size:2.8rem; font-weight:900; letter-spacing:-0.04em; line-height:1; color:#fff; transition: color 0.3s;">0.0</div>
                                    <div id="display_unit" style="font-size:0.65rem; font-weight:700; letter-spacing:0.2em; color:#4f6080; margin-top:8px;">БАР</div>
                                </div>
                            </div>
                        </div>

                        <div id="gaugeError" class="hidden w-full text-center mt-2">
                            <div class="rounded-xl px-4 py-2 inline-flex flex-col items-center justify-center" style="background: rgba(220,38,38,0.15); border: 1px solid rgba(220,38,38,0.3);">
                                <div class="flex items-center space-x-1 text-red-400 mb-1">
                                    <svg class="w-3 h-3" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M8.257 3.099c.765-1.36 2.722-1.36 3.486 0l5.58 9.92c.75 1.334-.213 2.98-1.742 2.98H4.42c-1.53 0-2.493-1.646-1.743-2.98l5.58-9.92zM11 13a1 1 0 11-2 0 1 1 0 012 0zm-1-8a1 1 0 00-1 1v3a1 1 0 002 0V6a1 1 0 00-1-1z" clip-rule="evenodd"></path></svg>
                                    <span class="text-[10px] font-bold uppercase tracking-wider">Перегруз</span>
                                </div>
                                <div class="text-sm" style="color:#fca5a5;">
                                    Требуется: <span id="required_gauge" class="font-black text-white text-lg">0</span> <span id="err_unit" class="text-xs font-bold"></span>
                                </div>
                            </div>
                        </div>

                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const presses = {
            press1: { cylinders: 8, diameter: 80, maxL: 3500, maxW: 1300, unit: "БАР", factor: 1, limit: 120 },
            press2: { cylinders: 4, diameter: 70, maxL: 6000, maxW: 1500, unit: "МПА", factor: 0.1, limit: 15 }
        };

        const el = {
            press: document.getElementById('pressSelect'),
            lInput: document.getElementById('lengthInput'),
            lSlider: document.getElementById('lengthSlider'),
            wInput: document.getElementById('widthInput'),
            wSlider: document.getElementById('widthSlider'),
            preset: document.getElementById('presetSelect'),
            
            hParams: document.getElementById('honeycombParams'),
            cellSize: document.getElementById('cellSize'),
            foilThick: document.getElementById('foilThick'),
            faceSheet: document.getElementById('faceSheet'),
            
            customRow: document.getElementById('customPressureRow'),
            udSlider: document.getElementById('udPressure'),
            valUd: document.getElementById('val_ud'),
            
            resArea: document.getElementById('res_area'),
            resFill: document.getElementById('res_fill'),
            resUd: document.getElementById('res_ud'),
            resGauge: document.getElementById('display_gauge'),
            resUnit: document.getElementById('display_unit'),
            areaWarning: document.getElementById('areaWarning'),
            
            gaugeNormal: document.getElementById('gaugeNormal'),
            gaugeError: document.getElementById('gaugeError'),
            requiredGauge: document.getElementById('required_gauge'),
            errUnit: document.getElementById('err_unit')
        };

        function getBaseStrength(size, foil, sheet) {
            // База: ячейка 9.5, фольга 0.05, лист 1.0 = 0.6 кг/см²
            const base = 0.6; 
            
            // Ячейка (меньше ячейка -> больше давление)
            let cellMult = 1.0;
            if (size === "6.3") cellMult = 1.4;
            if (size === "12.7") cellMult = 0.7;

            // Фольга (тоньше фольга -> меньше давление)
            let foilMult = 1.0;
            if (foil === "0.045") foilMult = 0.9;
            if (foil === "0.04") foilMult = 0.8;

            // Алюминиевый лист (тоньше лист -> меньше давление)
            let sheetMult = 1.0;
            let s = parseFloat(sheet);
            if (s === 0.5) sheetMult = 0.75;
            if (s === 0.7) sheetMult = 0.85;
            if (s === 1.2) sheetMult = 1.1;
            if (s === 1.5) sheetMult = 1.25;
            if (s === 2.0) sheetMult = 1.5;

            return base * cellMult * foilMult * sheetMult;
        }

        // ── Спидометр ─────────────────────────────────────────────
        function polarToXY(cx, cy, r, angleDeg) {
            const rad = (angleDeg) * Math.PI / 180;
            return { x: cx + r * Math.sin(rad), y: cy - r * Math.cos(rad) };
        }

        function arcPath(cx, cy, r, startDeg, endDeg) {
            const s = polarToXY(cx, cy, r, startDeg);
            const e = polarToXY(cx, cy, r, endDeg);
            const large = (endDeg - startDeg) > 180 ? 1 : 0;
            return `M ${s.x.toFixed(2)} ${s.y.toFixed(2)} A ${r} ${r} 0 ${large} 1 ${e.x.toFixed(2)} ${e.y.toFixed(2)}`;
        }

        function drawSpeedometer(value, limit) {
            const cx = 150, cy = 155, r = 95;
            const startDeg = -135, endDeg = 135; 
            const dangerFrac = 0.8;
            const frac = Math.min(value / limit, 1);

            document.getElementById('gaugeTrackBg').setAttribute('d', arcPath(cx, cy, r, startDeg, endDeg));

            const dangerStart = startDeg + (endDeg - startDeg) * dangerFrac;
            const dangerPath = arcPath(cx, cy, r, dangerStart, endDeg);
            document.getElementById('gaugeTrackDanger').setAttribute('d', dangerPath);
            document.getElementById('gaugeTrackDangerGlow').setAttribute('d', dangerPath);

            const fillEnd = startDeg + (endDeg - startDeg) * frac;
            const fillColor = frac >= dangerFrac ? '#ef4444' : frac >= 0.5 ? '#f59e0b' : '#6366f1';
            const fillGlowColor = frac >= dangerFrac ? '#ef4444' : frac >= 0.5 ? '#f59e0b' : '#818cf8';
            const fillPath = frac > 0.005 ? arcPath(cx, cy, r, startDeg, fillEnd) : '';
            document.getElementById('gaugeTrackFill').setAttribute('d', fillPath);
            document.getElementById('gaugeTrackFill').setAttribute('stroke', fillColor);
            document.getElementById('gaugeTrackFillGlow').setAttribute('d', fillPath);
            document.getElementById('gaugeTrackFillGlow').setAttribute('stroke', fillGlowColor);

            const ticksEl = document.getElementById('gaugeTicks');
            ticksEl.innerHTML = '';
            const majorCount = 10, minorPerMajor = 4;
            const totalTicks = majorCount * minorPerMajor;
            for (let i = 0; i <= totalTicks; i++) {
                const f = i / totalTicks;
                const deg = startDeg + (endDeg - startDeg) * f;
                const isMajor = i % minorPerMajor === 0;
                const tickLen = isMajor ? 10 : 5;
                const inner = polarToXY(cx, cy, r - 5, deg);
                const outer = polarToXY(cx, cy, r - 5 - tickLen, deg);
                const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                line.setAttribute('x1', inner.x.toFixed(2)); line.setAttribute('y1', inner.y.toFixed(2));
                line.setAttribute('x2', outer.x.toFixed(2)); line.setAttribute('y2', outer.y.toFixed(2));
                line.setAttribute('stroke', isMajor ? '#3a4a6a' : '#1e2a40');
                line.setAttribute('stroke-width', isMajor ? '1.5' : '0.8');
                ticksEl.appendChild(line);
                if (isMajor) {
                    const lp = polarToXY(cx, cy, r - 28, deg);
                    const txt = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                    txt.setAttribute('x', lp.x.toFixed(2)); txt.setAttribute('y', lp.y.toFixed(2));
                    txt.setAttribute('text-anchor', 'middle');
                    txt.setAttribute('dominant-baseline', 'middle');
                    txt.setAttribute('fill', f >= dangerFrac ? '#7f3030' : '#2e3f5a');
                    txt.setAttribute('font-size', '8.5');
                    txt.setAttribute('font-weight', '600');
                    txt.setAttribute('font-family', 'Inter, sans-serif');
                    txt.textContent = Math.round(limit * f);
                    ticksEl.appendChild(txt);
                }
            }

            const needleDeg = startDeg + (endDeg - startDeg) * frac;
            document.getElementById('needleGroup').setAttribute('transform', `rotate(${needleDeg}, ${cx}, ${cy})`);
            document.getElementById('centerCap').setAttribute('fill', fillColor);
        }
        // ─────────────────────────────────────────────────────────

        function calculate() {
            const p = presses[el.press.value];
            
            el.lSlider.max = p.maxL;
            el.wSlider.max = p.maxW;
            
            let L = parseFloat(el.lInput.value) || 0;
            let W = parseFloat(el.wInput.value) || 0;
            
            if (L > p.maxL) { L = p.maxL; el.lInput.value = L; }
            if (W > p.maxW) { W = p.maxW; el.wInput.value = W; }

            el.lSlider.value = L;
            el.wSlider.value = W;

            const areaCm2 = (L * W) / 100;
            const areaM2 = (L * W) / 1000000;
            const pressMaxArea = (p.maxL * p.maxW) / 1000000;
            const fillPercent = (areaM2 / pressMaxArea) * 100;

            // Логика видимости параметров: только для алюминиевой соты
            const showHoneycombParams = (el.preset.value === 'honeycomb_assembly');
            if (showHoneycombParams) {
                el.hParams.classList.remove('hidden');
                el.hParams.classList.add('flex');
            } else {
                el.hParams.classList.add('hidden');
                el.hParams.classList.remove('flex');
            }

            let targetUd = 0;

            switch(el.preset.value) {
                case 'honeycomb_assembly':
                    targetUd = getBaseStrength(el.cellSize.value, el.foilThick.value, el.faceSheet.value);
                    el.customRow.classList.add('hidden');
                    break;
                case 'veneer_on_panel':
                    targetUd = 0.6; // Пропорционально снижено с учетом новой базы
                    el.customRow.classList.add('hidden');
                    break;
                case 'hpl_on_honeycomb':
                    targetUd = 0.8; // Жесткий HPL, давление чуть выше
                    el.customRow.classList.add('hidden');
                    break;
                case 'stone_on_honeycomb':
                    targetUd = 0.5; // Хрупкий камень
                    el.customRow.classList.add('hidden');
                    break;
                case 'custom':
                    el.customRow.classList.remove('hidden');
                    targetUd = parseFloat(el.udSlider.value);
                    break;
            }

            const radius = p.diameter / 2 / 10;
            const cylAreaTotal = p.cylinders * Math.PI * Math.pow(radius, 2);
            let gaugeValue = (targetUd * areaCm2) / cylAreaTotal;
            gaugeValue = gaugeValue * p.factor;

            // Рендер результатов
            el.resArea.innerText = areaM2.toFixed(2);
            el.resFill.innerText = Math.round(fillPercent) + '%';
            el.resUd.innerText = targetUd.toFixed(2);
            el.resUnit.innerText = p.unit;
            el.valUd.innerText = targetUd.toFixed(1);
            el.errUnit.innerText = p.unit;

            if (fillPercent < 50) {
                el.areaWarning.classList.remove('hidden');
                el.resFill.classList.add('text-amber-400');
            } else {
                el.areaWarning.classList.add('hidden');
                el.resFill.classList.remove('text-amber-400');
            }

            // Логика перегруза (манометр остается, появляется плашка)
            if (gaugeValue > p.limit) {
                el.resGauge.innerText = p.limit.toFixed(p.unit === "МПА" ? 2 : 1);
                el.resGauge.style.color = '#ef4444'; // Красный цвет цифр при перегрузе
                drawSpeedometer(p.limit, p.limit); // Стрелка замирает на максимуме
                
                el.gaugeError.classList.remove('hidden');
                el.requiredGauge.innerText = gaugeValue.toFixed(p.unit === "МПА" ? 2 : 1);
            } else {
                el.resGauge.innerText = gaugeValue.toFixed(p.unit === "МПА" ? 2 : 1);
                el.resGauge.style.color = '#fff';
                drawSpeedometer(gaugeValue, p.limit);
                
                el.gaugeError.classList.add('hidden');
            }
        }

        el.lSlider.addEventListener('input', () => { el.lInput.value = el.lSlider.value; calculate(); });
        el.wSlider.addEventListener('input', () => { el.wInput.value = el.wSlider.value; calculate(); });
        el.lInput.addEventListener('input', () => { calculate(); });
        el.wInput.addEventListener('input', () => { calculate(); });

        el.lInput.value = 3000;
        el.wInput.value = 1000;

        [el.press, el.preset, el.udSlider, el.cellSize, el.foilThick, el.faceSheet].forEach(element => {
            element.addEventListener('input', calculate);
        });

        calculate();
    </script>
</body>
</html>
