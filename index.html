<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ЗСМК ТехноХаб</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; margin: 0; overflow: hidden; display: flex; flex-direction: column; height: 100vh; }
        
        .top-nav {
            position: absolute;
            top: 15px;
            right: 20px;
            z-index: 100;
            display: flex;
            gap: 8px;
            background: rgba(30, 41, 59, 0.9);
            backdrop-filter: blur(10px);
            padding: 6px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.3);
        }

        .nav-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 14px;
            border-radius: 8px;
            color: #94a3b8;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 13px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
        }

        .nav-btn:hover { background: rgba(255,255,255,0.05); color: #f8fafc; }
        .nav-btn.active { background: #3b82f6; color: white; box-shadow: 0 4px 12px rgba(59, 130, 246, 0.4); }

        /* Стили для скрытия неактивных кнопок */
        .btn-hidden {
            width: 0 !important;
            min-width: 0 !important;
            padding-left: 0 !important;
            padding-right: 0 !important;
            margin: 0 !important;
            border: 0 !important;
            opacity: 0 !important;
            overflow: hidden !important;
            pointer-events: none;
            gap: 0;
        }

        main { flex: 1; position: relative; background: #020617; }
        iframe { width: 100%; height: 100%; border: none; }

        footer {
            background: #0f172a;
            border-top: 1px solid #1e293b;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .auth-info {
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 11px;
            color: #64748b;
        }

        .digital-sig {
            font-family: 'JetBrains Mono', monospace;
            color: #3b82f6;
            border: 1px solid #3b82f6;
            padding: 2px 8px;
            border-radius: 4px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="top-nav">
        <button onclick="switchTab('briket', this)" class="nav-btn active"><em data-lucide="layers" class="w-4 h-4"></em><span>Брикеты</span></button>
        <button onclick="switchTab('cnc', this)" class="nav-btn">
            <i data-lucide="cpu" class="w-4 h-4"></i><span>CoolSim</span>
        </button>
        <button onclick="switchTab('flow', this)" class="nav-btn">
            <i data-lucide="timer" class="w-4 h-4"></i><span>PressFlow</span>
        </button>
        <button onclick="switchTab('matrix', this)" class="nav-btn">
            <i data-lucide="gauge" class="w-4 h-4"></i><span>PressMatrix</span>
        </button>
        <button onclick="switchTab('aqua', this)" class="nav-btn">
            <i data-lucide="droplets" class="w-4 h-4"></i><span>Гидрорезка</span>
        </button>
        <button onclick="switchTab('primecost', this)" class="nav-btn">
            <i data-lucide="calculator" class="w-4 h-4"></i><span>Себестоимость</span>
        </button>
    </div>

    <main>
        <div id="briket" class="tab-content h-full">
            <iframe src="BriketMaster.html"></iframe>
        </div>
        <div id="cnc" class="tab-content h-full hidden">
            <iframe src="CoolSim.html"></iframe>
        </div>
        <div id="flow" class="tab-content h-full hidden">
            <iframe src="PressFlow.html"></iframe>
        </div>
        <div id="matrix" class="tab-content h-full hidden">
            <iframe src="PressMatrix.html"></iframe>
        </div>
        <div id="aqua" class="tab-content h-full hidden">
            <iframe src="AquaBlade.html"></iframe>
        </div>
        <div id="primecost" class="tab-content h-full hidden">
            <iframe src="PrimeCost.html"></iframe>
        </div>
    </main>

    <footer>
        <div class="auth-info">
            <div class="digital-sig">ЗСМК ТехноХаб v1.4</div>
            <div><span class="font-bold text-slate-400">АВТОР:</span> Фадеев А.Ю.</div>
            <div><span class="font-bold text-slate-400">ДОЛЖНОСТЬ:</span> Главный технолог ООО «ЗСМК»</div>
        </div>
        <div class="text-[10px] font-mono text-slate-600 uppercase"> System Stable | 09.06.2026 </div>
    </footer>

    <script>
        lucide.createIcons();

        const nav = document.querySelector('.top-nav');
        let collapseTimer;

        // Функция сворачивания меню до активной кнопки
        function collapseMenu() {
            const buttons = nav.querySelectorAll('.nav-btn');
            buttons.forEach(btn => {
                if (!btn.classList.contains('active')) {
                    btn.classList.add('btn-hidden');
                }
            });
        }

        // Функция полного разворачивания меню
        function expandMenu() {
            const buttons = nav.querySelectorAll('.nav-btn');
            buttons.forEach(btn => {
                btn.classList.remove('btn-hidden');
            });
        }

        // Запуск таймера сворачивания на 3 секунды
        function resetCollapseTimer() {
            clearTimeout(collapseTimer);
            collapseTimer = setTimeout(collapseMenu, 3000);
        }

        // Инициализация: через 3 секунды после загрузки сворачиваем меню
        collapseTimer = setTimeout(collapseMenu, 3000);

        // Наведение на панель меню — разворачиваем и сбрасываем таймер
        nav.addEventListener('mouseenter', () => {
            clearTimeout(collapseTimer);
            expandMenu();
        });

        // Уход курсора с панели — запускаем таймер сворачивания
        nav.addEventListener('mouseleave', () => {
            resetCollapseTimer();
        });

        function switchTab(tabId, btn) {
            // Скрываем все вкладки и убираем активность у всех кнопок
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.add('hidden'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            
            // Активируем выбранную вкладку и кнопку
            const activeTab = document.getElementById(tabId);
            activeTab.classList.remove('hidden');
            btn.classList.add('active');

            // Перезагрузка iframe для сброса состояний
            const iframe = activeTab.querySelector('iframe');
            if(iframe) {
                iframe.src = iframe.src;
            }

            // После клика разворачиваем меню и управляем таймером
            expandMenu();
            
            // Если в данный момент мышь не над меню — запускаем таймер сворачивания
            if (!nav.matches(':hover')) {
                resetCollapseTimer();
            } else {
                // Иначе просто очищаем таймер, чтобы меню оставалось открытым под курсором
                clearTimeout(collapseTimer);
            }
        }
    </script>
</body>
</html>
