<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Калькулятор развёртки листового металла · Durma AD-R 40175</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0c141f;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 1.2rem;
            color: #eef3f9;
        }
        .app {
            display: flex;
            width: 100%;
            max-width: 1450px;
            gap: 1.2rem;
            background: rgba(18, 28, 40, 0.85);
            backdrop-filter: blur(24px);
            border-radius: 2rem;
            padding: 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.7);
            flex-wrap: wrap;
        }
        .sidebar { 
            flex: 0 0 430px; 
            background: rgba(10, 18, 28, 0.5); 
            border-radius: 1.5rem; 
            padding: 1.5rem; 
            border: 1px solid rgba(255, 255, 255, 0.05);
            max-height: 90vh;
            overflow-y: auto;
        }
        .sidebar::-webkit-scrollbar { width: 4px; }
        .sidebar::-webkit-scrollbar-track { background: transparent; }
        .sidebar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }
        .main-area { flex: 1 1 550px; min-width: 450px; display: flex; flex-direction: column; background: #0a121e; border-radius: 1.5rem; padding: 1.2rem; border: 1px solid rgba(255, 255, 255, 0.06); }
        .header { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 1.2rem; }
        .header svg { width: 28px; height: 28px; fill: none; stroke: #60a5fa; stroke-width: 2; }
        h1 { font-size: 1.5rem; font-weight: 500; letter-spacing: -0.3px; color: #fff; }
        .mode-toggle { display: flex; gap: 0.3rem; margin-left: 0.8rem; }
        .toggle-btn {
            padding: 0.3rem 0.7rem; border-radius: 1rem; font-size: 0.7rem;
            font-weight: 600; text-decoration: none; transition: 0.15s;
            background: rgba(100,150,200,0.15); border: 1px solid rgba(100,150,200,0.3);
            color: #8899b5; cursor: pointer;
        }
        .toggle-btn.active { background: #2563eb; color: white; border-color: #2563eb; }
        .toggle-btn:hover:not(.active) { background: rgba(100,150,200,0.3); }
        .subtitle { font-size: 0.75rem; color: #8899b5; margin-bottom: 1.5rem; }
        .input-group { margin-bottom: 1rem; }
        .label-row { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 0.3rem; }
        label { font-size: 0.9rem; font-weight: 500; letter-spacing: 0.3px; color: #d0ddf0; }
        .preset-group { display: flex; gap: 0.4rem; flex-wrap: wrap; }
        .preset-btn {
            background: rgba(100, 150, 200, 0.2);
            border: 1px solid rgba(100, 150, 200, 0.4);
            color: #c0d4f0;
            font-size: 0.7rem;
            padding: 0.2rem 0.6rem;
            border-radius: 1rem;
            cursor: pointer;
            transition: 0.1s;
            white-space: nowrap;
        }
        .preset-btn:hover { background: #2563eb; color: white; border-color: white; }
        .preset-btn.active-preset { background: #2563eb; color: white; border-color: #60a5fa; }
        select, input { width: 100%; padding: 0.65rem 0.9rem; border-radius: 0.8rem; background: rgba(0, 0, 0, 0.45); border: 1px solid rgba(255, 255, 255, 0.12); color: white; font-size: 0.9rem; outline: none; transition: 0.2s; }
        select:focus, input:focus { border-color: #3b82f6; box-shadow: 0 0 12px rgba(59, 130, 246, 0.3); }
        .input-row { display: flex; gap: 0.5rem; align-items: center; }
        .input-row input[type=number] { flex: 1; }
        .input-row input[type=range] { flex: 2; padding: 0; background: transparent; border: none; height: 6px; border-radius: 3px; background: rgba(255,255,255,0.2); outline: none; cursor: pointer; -webkit-appearance: none; appearance: none; }
        .input-row input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%; background: #60a5fa; border: 2px solid white; cursor: pointer; box-shadow: 0 2px 6px rgba(0,0,0,0.3); }
        .warning {
            font-size: 0.85rem; font-weight: 600; line-height: 1.5; margin-top: 0.3rem; padding: 0.5rem 0.7rem;
            background: rgba(251, 191, 36, 0.15); border-radius: 0.6rem; transition: all 0.2s; color: #ffdd99;
        }
        .warning-active {
            animation: blinkWarning 3s ease-in-out infinite;
            background: rgba(220, 60, 50, 0.85); border: 1px solid #ffaa00; color: #fff3c9; font-weight: 700;
        }
        @keyframes blinkWarning {
            0% { background: rgba(220, 60, 50, 0.7); border-color: #ffaa00; }
            50% { background: rgba(255, 100, 50, 0.95); border-color: #ffcc44; }
            100% { background: rgba(220, 60, 50, 0.7); border-color: #ffaa00; }
        }
        .param-panel { display: flex; flex-wrap: wrap; gap: 0.5rem; align-items: center; background: #111c2b; border-radius: 1rem; padding: 0.7rem 1rem; margin-bottom: 0.8rem; border: 1px solid rgba(255,255,255,0.06); }
        .param-item { display: flex; flex-direction: column; align-items: center; gap: 0.15rem; background: rgba(255,255,255,0.03); padding: 0.45rem 0.8rem; border-radius: 0.7rem; border: 1px solid transparent; }
        .param-icon { font-size: 1.1rem; opacity: 0.8; }
        .param-value { font-size: 1.1rem; font-weight: 600; color: #fff; }
        .param-label { font-size: 0.7rem; text-transform: uppercase; color: #8b9bb5; }
        
        #resLength {
            color: #4ade80 !important;
            font-size: 1.25rem;
            font-weight: 700;
            text-shadow: 0 0 10px rgba(74, 222, 128, 0.3);
        }

        #btnExportDxf {
            cursor: pointer;
            border: 1px solid rgba(74, 222, 128, 0.2);
            background: rgba(74, 222, 128, 0.04);
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }
        #btnExportDxf:hover {
            background: rgba(74, 222, 128, 0.15);
            border-color: #4ade80;
            box-shadow: 0 0 15px rgba(74, 222, 128, 0.3);
            transform: translateY(-1px);
        }
        #btnExportDxf:active {
            transform: translateY(1px);
        }

        #resDieSelect {
            background: transparent; border: none; color: #60a5fa; font-size: 1.1rem; font-weight: 700;
            outline: none; cursor: pointer; padding: 0; font-family: inherit; width: 50px; text-align: center;
            border-bottom: 1px dashed rgba(96, 165, 250, 0.6); -webkit-appearance: none; appearance: none;
        }
        #resDieSelect option { background: #111c2b; color: white; font-weight: normal; }

        .view-toggle { display: flex; gap: 0.5rem; margin-bottom: 0.8rem; }
        .view-btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #a0b3cc; padding: 0.5rem 1rem; border-radius: 0.7rem; cursor: pointer; font-size: 0.8rem; font-weight: 500; transition: 0.2s; }
        .view-btn.active { background: #2563eb; border-color: #2563eb; color: white; }
        .canvas-wrapper { flex: 1; position: relative; background: #060d16; border-radius: 1rem; overflow: hidden; cursor: grab; min-height: 380px; }
        .canvas-wrapper:active { cursor: grabbing; }
        .canvas-wrapper canvas { width: 100% !important; height: 100% !important; display: block; }
        .zoom-controls { position: absolute; bottom: 12px; right: 16px; display: flex; gap: 8px; z-index: 5; }
        .zoom-btn {
            background: rgba(20, 30, 45, 0.8); border: 1px solid rgba(255,255,255,0.15); color: #e0e8f0;
            padding: 0.5rem 1rem; border-radius: 8px; font-size: 1.1rem; font-weight: 600;
            cursor: pointer; backdrop-filter: blur(8px); transition: 0.1s; min-width: 44px; text-align: center;
        }
        .zoom-btn:hover { background: rgba(40, 55, 75, 0.9); }
        .footer-note { margin-top: 0.6rem; text-align: right; font-size: 0.7rem; color: #5c6e82; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 0.5rem; }
        .explanation {
            margin-top: 0.6rem; padding: 0.5rem 0.8rem; background: rgba(255,255,255,0.03); border-radius: 0.6rem;
            font-size: 13px; color: #b4c6e0; line-height: 1.5; border: 1px solid rgba(255,255,255,0.05); white-space: pre-line;
        }
        .dim-text { font-family: 'Inter', sans-serif; font-size: 13px; fill: #d5e0f0; font-weight: 500; }
        .bend-line { stroke: #f97316; stroke-width: 2; stroke-dasharray: 5 3; }
        .dim-line { stroke: #64748b; stroke-width: 1.2; }
        .flat-body { fill: #1e3b5c; stroke: #5c7b9c; stroke-width: 1.5; }
        .bend-zone { fill: #f97316; opacity: 0.25; cursor: pointer; }
        .bend-zone:hover { opacity: 0.45; }
        .bend-zone-text { fill: #ffffff; font-size: 10px; font-weight: 600; text-anchor: middle; dominant-baseline: central; }
        
        .fix-link { text-decoration: underline; cursor: pointer; color: #60a5fa; font-weight: 700; }
        
        .inner-indicator { 
            font-size: 0.72rem; 
            color: #34d399; 
            background: rgba(52, 211, 153, 0.12);
            border: 1px solid rgba(52, 211, 153, 0.25);
            padding: 0.4rem 0.55rem;
            border-radius: 0.6rem;
            white-space: nowrap;
            font-weight: 600;
            letter-spacing: 0.2px;
            display: inline-block;
            box-shadow: inset 0 1px 2px rgba(0,0,0,0.2);
            width: 90px;
            text-align: center;
        }

        .bend-item {
            background: rgba(249, 115, 22, 0.08);
            border: 1px solid rgba(249, 115, 22, 0.2);
            border-radius: 0.8rem;
            padding: 0.6rem 0.8rem;
            margin-bottom: 0.4rem;
        }
        .bend-item-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 0.4rem;
        }
        .bend-item-label {
            font-size: 0.75rem;
            font-weight: 600;
            color: #f97316;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .bend-item-actions { display: flex; gap: 0.3rem; align-items: center; }
        .dir-btn {
            background: rgba(249, 115, 22, 0.2);
            border: 1px solid rgba(249, 115, 22, 0.4);
            color: #fbbf24;
            font-size: 0.7rem;
            padding: 0.2rem 0.5rem;
            border-radius: 0.5rem;
            cursor: pointer;
            transition: 0.15s;
            font-weight: 600;
        }
        .dir-btn:hover { background: #f97316; color: white; }
        .dir-btn.dir-up { background: rgba(52, 211, 153, 0.2); border-color: rgba(52, 211, 153, 0.4); color: #34d399; }
        .dir-btn.dir-up:hover { background: #34d399; color: white; }
        .dir-btn.dir-down { background: rgba(96, 165, 250, 0.2); border-color: rgba(96, 165, 250, 0.4); color: #60a5fa; }
        .dir-btn.dir-down:hover { background: #60a5fa; color: white; }
        .del-bend-btn {
            background: rgba(220, 60, 50, 0.15);
            border: 1px solid rgba(220, 60, 50, 0.3);
            color: #f87171;
            font-size: 0.75rem;
            padding: 0.15rem 0.45rem;
            border-radius: 0.5rem;
            cursor: pointer;
            transition: 0.15s;
        }
        .del-bend-btn:hover { background: #dc3c32; color: white; }

        .segment-item {
            background: rgba(30, 59, 92, 0.3);
            border: 1px solid rgba(92, 123, 156, 0.25);
            border-radius: 0.8rem;
            padding: 0.6rem 0.8rem;
            margin-bottom: 0.3rem;
        }
        .segment-label {
            font-size: 0.72rem;
            font-weight: 600;
            color: #60a5fa;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 0.3rem;
        }

        .add-btn-row { display: flex; gap: 0.4rem; margin-top: 0.6rem; }
        .add-btn {
            flex: 1;
            background: rgba(100, 150, 200, 0.2);
            border: 1px solid rgba(100, 150, 200, 0.4);
            color: #c0d4f0;
            font-size: 0.75rem;
            padding: 0.35rem 0.6rem;
            border-radius: 0.6rem;
            cursor: pointer;
            transition: 0.15s;
            font-weight: 600;
            text-align: center;
        }
        .add-btn:hover { background: rgba(100, 150, 200, 0.35); border-color: #c0d4f0; }

        .save-load-section {
            margin-top: 0.8rem;
            padding-top: 0.8rem;
            border-top: 1px solid rgba(255,255,255,0.06);
        }
        .save-row { display: flex; gap: 0.4rem; margin-bottom: 0.5rem; }
        .save-row input { flex: 1; }
        .save-btn, .load-btn, .delete-btn {
            padding: 0.45rem 0.7rem;
            border-radius: 0.7rem;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            border: 1px solid;
            transition: 0.15s;
            white-space: nowrap;
        }
        .save-btn { background: rgba(59, 130, 246, 0.15); border-color: rgba(59, 130, 246, 0.4); color: #60a5fa; }
        .save-btn:hover { background: #2563eb; color: white; }
        .load-btn { background: rgba(52, 211, 153, 0.15); border-color: rgba(52, 211, 153, 0.4); color: #34d399; }
        .load-btn:hover { background: #10b981; color: white; }
        .delete-btn { background: rgba(220, 60, 50, 0.15); border-color: rgba(220, 60, 50, 0.3); color: #f87171; }
        .delete-btn:hover { background: #dc3c32; color: white; }

        .profiles-list {
            max-height: 120px;
            overflow-y: auto;
            margin-bottom: 0.4rem;
        }
        .profiles-list::-webkit-scrollbar { width: 3px; }
        .profiles-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }
        .profile-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.35rem 0.6rem;
            border-radius: 0.5rem;
            cursor: pointer;
            transition: 0.1s;
            font-size: 0.8rem;
            color: #b4c6e0;
        }
        .profile-item:hover { background: rgba(255,255,255,0.06); }
        .profile-item.selected { background: rgba(59, 130, 246, 0.2); color: #60a5fa; }
        .profile-item-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .profile-item-date { font-size: 0.65rem; color: #5c6e82; margin-left: 0.5rem; white-space: nowrap; }

        .bend-connector {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 28px;
            position: relative;
        }
        .bend-connector::before {
            content: '';
            position: absolute;
            left: 50%;
            top: 0;
            bottom: 0;
            width: 1px;
            background: rgba(249, 115, 22, 0.3);
        }

        @media (max-width: 850px) {
            .app { flex-direction: column; }
            .sidebar { flex: auto; max-height: none; }
            .main-area { min-width: auto; }
        }
    </style>
</head>
<body>
<div class="app">
    <div class="sidebar">
        <div class="header">
            <svg viewBox="0 0 24 24"><path d="M3 3h7v7H3V3zm11 0h7v7h-7V3zM3 14h7v7H3v-7zm11 0h7v7h-7v-7z" /><line x1="3" y1="3" x2="10" y2="10" stroke-width="1.5" /><line x1="14" y1="3" x2="21" y2="10" /><line x1="3" y1="14" x2="10" y2="21" /><line x1="14" y1="14" x2="21" y2="21" /></svg>
            <h1>Калькулятор гибки</h1>
            <div class="mode-toggle">
                <a href="Bender.html" class="toggle-btn">Bender</a>
                <a href="multibender.html" class="toggle-btn">2D</a>
                <span class="toggle-btn active">3D</span>
            </div>
        </div>
        <div class="input-group">
            <div class="label-row"><label>🔩 Материал</label></div>
            <select id="material" style="display:none;">
                <option value="steel">Сталь</option><option value="stainless">Нерж.</option>
                <option value="aluminum">Алюм.</option><option value="copper">Медь</option>
            </select>
            <div class="preset-group" id="materialPresets">
                <span class="preset-btn mat-btn active-preset" data-material="steel">Сталь</span>
                <span class="preset-btn mat-btn" data-material="stainless">Нерж.</span>
                <span class="preset-btn mat-btn" data-material="aluminum">Алюм.</span>
                <span class="preset-btn mat-btn" data-material="copper">Медь</span>
            </div>
        </div>
        
        <div class="input-group">
            <div class="label-row">
                <label>📏 Толщина S, мм</label>
                <div class="preset-group" id="thicknessPresets">
                    <span class="preset-btn" data-thickness="1">1</span>
                    <span class="preset-btn" data-thickness="1.5">1.5</span>
                    <span class="preset-btn" data-thickness="2">2</span>
                    <span class="preset-btn" data-thickness="3">3</span>
                    <span class="preset-btn" data-thickness="4">4</span>
                    <span class="preset-btn" data-thickness="5">5</span>
                </div>
            </div>
            <div class="input-row">
                <input type="number" id="thickness" value="2.0" step="0.1" min="0.5" max="7">
                <input type="range" id="thicknessSlider" min="0.5" max="7" step="0.1" value="2.0">
            </div>
        </div>

        <div class="input-group">
            <div class="label-row">
                <label>📏 Длина гиба L, мм</label>
            </div>
            <div class="input-row">
                <input type="number" id="bendLength" value="100" step="1" min="10" max="4150">
                <input type="range" id="bendLengthSlider" min="50" max="4150" step="50" value="100">
            </div>
        </div>

        <div class="input-group">
            <div class="label-row">
                <label>🧩 Быстрые пресеты</label>
            </div>
            <div class="preset-group" id="profilePresets">
                <span class="preset-btn" data-preset="angle">Уголок</span>
                <span class="preset-btn" data-preset="U">П-образный</span>
                <span class="preset-btn" data-preset="Z">Z-зигзаг</span>
                <span class="preset-btn" data-preset="korob">Короб</span>
                <span class="preset-btn" data-preset="shlyapny">Шляпный</span>
                <span class="preset-btn" data-preset="shveller">Швеллер</span>
            </div>
        </div>

        <div id="bendEditor"></div>

        <div id="warningBox" class="warning"></div>

        <div class="save-load-section">
            <div class="label-row"><label>💾 Сохранённые детали</label></div>
            <div class="profiles-list" id="profilesList"></div>
            <div class="save-row">
                <input type="text" id="profileName" placeholder="Имя детали..." style="flex:1;">
                <button class="save-btn" id="saveBtn">💾</button>
                <button class="load-btn" id="loadBtn">📂</button>
                <button class="delete-btn" id="deleteBtn">🗑</button>
            </div>
        </div>
    </div>
    <div class="main-area">
        <div class="param-panel" id="results">
            <div class="param-item">
                <span class="param-label">Матрица</span>
                <div style="display:flex;align-items:center;gap:0.3rem;">
                    <span class="param-icon">🛠️</span>
                    <select id="resDieSelect" title="Нажмите, чтобы изменить матрицу вручную">
                        <option value="10">V10</option>
                        <option value="16">V16</option>
                        <option value="22">V22</option>
                        <option value="35">V35</option>
                        <option value="50">V50</option>
                    </select>
                </div>
            </div>
            <div class="param-item">
                <span class="param-label">Усилие пресса</span>
                <div style="display:flex;align-items:center;gap:0.3rem;">
                    <span class="param-icon">🏋️‍♂️</span>
                    <span class="param-value" id="resForce">0.0 т</span>
                </div>
            </div>
            <div class="param-item">
                <span class="param-label">Радиус Ri</span>
                <div style="display:flex;align-items:center;gap:0.3rem;">
                    <span class="param-icon">⭕</span>
                    <span class="param-value" id="resRadius">2.42</span>
                </div>
            </div>
            <div class="param-item">
                <span class="param-label">K-фактор</span>
                <div style="display:flex;align-items:center;gap:0.3rem;">
                    <span class="param-icon">📊</span>
                    <span class="param-value" id="resK">0.34</span>
                </div>
            </div>
            <div class="param-item">
                <span class="param-label">Σ BD, мм</span>
                <div style="display:flex;align-items:center;gap:0.3rem;">
                    <span class="param-icon">➖</span>
                    <span class="param-value" id="resBD">2.51</span>
                </div>
            </div>
            <div class="param-item" id="btnExportDxf" title="Скачать чертеж развёртки в формате DXF">
                <span class="param-label">Развёртка DXF</span>
                <div style="display:flex;align-items:center;gap:0.3rem;">
                    <span class="param-icon">📋</span>
                    <span class="param-value" id="resLength">217.4</span>
                </div>
            </div>
        </div>
        <div class="view-toggle">
            <button class="view-btn active" id="bentViewBtn">🔧 Согнутая деталь</button>
            <button class="view-btn" id="flatViewBtn">📐 Развёртка</button>
        </div>
        <div class="canvas-wrapper" id="drawingArea">
            <canvas id="threeCanvas"></canvas>
            <div class="zoom-controls">
                <button class="zoom-btn" id="zoomInBtn" title="Приблизить">＋</button>
                <button class="zoom-btn" id="zoomOutBtn" title="Отдалить">－</button>
                <button class="zoom-btn" id="resetViewBtn" title="Сбросить вид">⌂</button>
            </div>
        </div>
        <div class="explanation" id="explanation"></div>
    </div>
</div>

<script>
    (function() {
        const materialData = {
            steel: { name:'Сталь', Rm:400, E:210000, minRiS:0.8 },
            stainless: { name:'Нерж.', Rm:600, E:193000, minRiS:1.2 },
            aluminum: { name:'Алюм.', Rm:250, E:70000, minRiS:1.5 },
            copper: { name:'Медь', Rm:250, E:117000, minRiS:1.0 }
        };

        const availableDies = [10, 16, 22, 35, 50];
        let manualDie = null;

        // ---------- ДИНАМИЧЕСКАЯ МОДЕЛЬ ДАННЫХ ----------
        let segments = [{ length: 50 }, { length: 30 }];
        let bends = [{ angle: 90, direction: 1 }];
        let selectedBendIdx = -1;

        function deepCopySegments() { return segments.map(s => ({ length: s.length })); }
        function deepCopyBends() { return bends.map(b => ({ angle: b.angle, direction: b.direction })); }

        // ---------- ФИЗИЧЕСКИЕ МОДЕЛИ ----------
        function getAirRadius(V, S, matKey) {
            const Rm = materialData[matKey].Rm;
            const baseRi = 0.156 * V * Math.pow(S / (V / 8), -0.2);
            return baseRi * Math.pow(Rm / 400, 0.15);
        }

        function getKFactor(Ri, S) {
            const ratio = Ri / S;
            const table = [
                { r: 0.5, k: 0.28 }, { r: 0.8, k: 0.32 }, { r: 1.0, k: 0.35 },
                { r: 1.5, k: 0.40 }, { r: 2.0, k: 0.43 }, { r: 3.0, k: 0.46 },
                { r: 4.0, k: 0.48 }, { r: 5.0, k: 0.49 }
            ];
            if (ratio <= table[0].r) return table[0].k;
            if (ratio >= table[table.length-1].r) return table[table.length-1].k;
            for (let i = 0; i < table.length - 1; i++) {
                if (ratio >= table[i].r && ratio <= table[i+1].r) {
                    const t = (ratio - table[i].r) / (table[i+1].r - table[i].r);
                    return table[i].k + t * (table[i+1].k - table[i].k);
                }
            }
            return 0.4;
        }

        function getSpringbackAngle(desiredBendDeg, Ri, S, matKey) {
            const mat = materialData[matKey];
            const rad = desiredBendDeg * Math.PI / 180;
            const deltaRad = (3 * mat.Rm * Ri) / (mat.E * S) * rad;
            return deltaRad * 180 / Math.PI;
        }

        function getAngleForceFactor(externalAngleDeg) {
            const a = externalAngleDeg;
            if (a < 90) return 1 + (90 - a) * 0.012;
            if (a > 90) return Math.max(0.5, 1 - (a - 90) * 0.008);
            return 1.0;
        }

        function getMinFlange(V, S, externalAngleDeg) {
            const halfAngleRad = (180 - externalAngleDeg) / 2 * Math.PI / 180;
            return (V / 2) * Math.tan(halfAngleRad) + S;
        }

        function autoSelectDie(matKey, S) {
            let bestV = availableDies[availableDies.length - 1];
            let bestScore = Infinity;
            const mat = materialData[matKey];
            for (let V of availableDies) {
                const Ri = getAirRadius(V, S, matKey);
                if (Ri / S < mat.minRiS) continue;
                const idealV = matKey === 'stainless' ? 10 * S : 8 * S;
                const score = Math.abs(V - idealV);
                if (score < bestScore) { bestScore = score; bestV = V; }
            }
            if (bestScore === Infinity) bestV = availableDies[availableDies.length - 1];
            return bestV;
        }

        // ---------- ВХОДНЫЕ ДАННЫЕ ----------
        function getMaterialKey() { return document.getElementById('material').value; }
        function getThickness() { return Math.min(7, Math.max(0.5, parseFloat(document.getElementById('thickness').value) || 0)); }
        function getBendLength() { return Math.min(4150, Math.max(10, parseFloat(document.getElementById('bendLength').value) || 200)); }

        function getBendAngles() {
            return bends.map(b => 180 - Math.min(170, Math.max(10, b.angle)));
        }

        function getExternalAngles() {
            return bends.map(b => b.angle);
        }

        function getProfileDims() {
            return { segments: deepCopySegments(), bends: deepCopyBends() };
        }

        // ---------- ЯДРО РАСЧЁТА ----------
        function calculateGeometry() {
            const matKey = getMaterialKey();
            const S = getThickness();
            if (S <= 0 || bends.length === 0) return null;

            let V;
            if (manualDie !== null) V = manualDie;
            else V = autoSelectDie(matKey, S);
            document.getElementById('resDieSelect').value = V;

            const R = getAirRadius(V, S, matKey);
            const K = getKFactor(R, S);
            const bendAngles = getBendAngles();
            const bendData = bendAngles.map(bendDeg => {
                const springbackDeg = getSpringbackAngle(bendDeg, R, S, matKey);
                const loadBendDeg = Math.max(0.1, bendDeg - springbackDeg);
                const rad = loadBendDeg * Math.PI / 180;
                const BA = Math.PI * (R + K * S) * (loadBendDeg / 180);
                const OSSB = (R + S) * Math.tan(rad / 2);
                const BD = 2 * OSSB - BA;
                return { bendAngleDeg: bendDeg, loadBendDeg, springbackDeg, OSSB, BA, BD };
            });

            return { matKey, S, V, R, K, bends: bendData };
        }

        function computeFlatLength(geom, dims) {
            if (!geom || dims.segments.length === 0) return 0;
            const totalBD = geom.bends.reduce((s, b) => s + b.BD, 0);
            const sumExt = dims.segments.reduce((s, seg) => s + seg.length, 0);
            return Math.max(0, sumExt - totalBD);
        }

        // ---------- ВАЛИДАЦИЯ ----------
        function validate(geom, dims, forceKN, forceTon, forcePerMeter) {
            if (!geom) return [];
            const { S, V, R } = geom;
            const mat = materialData[geom.matKey];
            const messages = [];

            if (R / S < mat.minRiS) {
                messages.push({
                    text: `⚠️ Ri/S = ${(R/S).toFixed(2)} меньше допустимого ${mat.minRiS} (риск трещин)`,
                    fixes: []
                });
            }

            const segs = dims.segments;
            const bd = dims.bends;
            for (let i = 0; i < segs.length; i++) {
                const extAngle = (i < bd.length) ? bd[i].angle : (i > 0 ? bd[i-1].angle : 90);
                const minF = getMinFlange(V, S, extAngle);
                if (segs[i].length < minF) {
                    const label = (i === 0 || i === segs.length - 1) ? `Полка ${i + 1}` : `Сегмент ${i + 1}`;
                    messages.push({
                        text: `⚠️ ${label} (${segs[i].length} мм) меньше мин. полки (${minF.toFixed(1)} мм)`,
                        fixes: [{ match: `${minF.toFixed(1)} мм`, field: `seg_${i}`, target: parseFloat(minF.toFixed(1)) }]
                    });
                }
            }

            for (let i = 0; i < bd.length; i++) {
                const leftOSSB = geom.bends[i] ? geom.bends[i].OSSB : 0;
                const rightOSSB = geom.bends[i] ? geom.bends[i].OSSB : 0;
                const midSeg = segs[i + 1];
                if (midSeg) {
                    const minWeb = leftOSSB + rightOSSB + 1;
                    if (midSeg.length < minWeb) {
                        messages.push({
                            text: `⚠️ Сегмент ${i + 2} (${midSeg.length} мм) слишком узкий (min ${minWeb.toFixed(1)} мм)`,
                            fixes: [{ match: `${minWeb.toFixed(1)} мм`, field: `seg_${i + 1}`, target: parseFloat(minWeb.toFixed(1)) }]
                        });
                    }
                }
            }

            if (forceTon > 175) {
                messages.push({ text: `❌ ПРЕВЫШЕНО УСИЛИЕ ПРЕССА! Макс. 175 т, требуется: ${forceTon.toFixed(1)} т`, fixes: [] });
            }
            if (forcePerMeter > 600) {
                messages.push({ text: `❌ ПРЕВЫШЕН ЛИМИТ ПУАНСОНА! Макс. 600 кН/м, текущее: ${forcePerMeter.toFixed(0)} кН/м`, fixes: [] });
            }
            if (forcePerMeter > 1000) {
                messages.push({ text: `❌ ПРЕВЫШЕН ЛИМИТ МАТРИЦЫ V${V}! Макс. 1000 кН/м, текущее: ${forcePerMeter.toFixed(0)} кН/м`, fixes: [] });
            }

            return messages;
        }

        // ---------- РЕДАКТОР ГИБОВ (UI) ----------
        function updateBendEditor() {
            const container = document.getElementById('bendEditor');
            let html = '';

            for (let i = 0; i < segments.length; i++) {
                const seg = segments[i];
                const isEnd = i === segments.length - 1;
                const label = (i === 0) ? 'Полка 1' : (isEnd ? `Полка ${i + 1}` : `Сегмент ${i + 1}`);

                html += `<div class="segment-item">
                    <div class="segment-label">${label}</div>
                    <div class="input-group" style="margin-bottom:0;">
                        <div class="input-row">
                            <input type="number" id="seg_${i}" value="${seg.length}" step="1" min="6" max="200" style="flex:0 0 85px; text-align:center;">
                            <span class="inner-indicator" id="inner_seg_${i}"></span>
                            <input type="range" id="seg_${i}Slider" min="6" max="200" step="1" value="${seg.length}">
                        </div>
                    </div>
                </div>`;

                if (i < bends.length) {
                    const b = bends[i];
                    const dirLabel = b.direction > 0 ? '↑ Вверх' : '↓ Вниз';
                    const dirClass = b.direction > 0 ? 'dir-up' : 'dir-down';
                    const sel = (i === selectedBendIdx) ? ' style="box-shadow: 0 0 0 2px #f97316;"' : '';

                    html += `<div class="bend-item"${sel} data-bend-idx="${i}">
                        <div class="bend-item-header">
                            <span class="bend-item-label">Гиб ${i + 1}</span>
                            <div class="bend-item-actions">
                                <button class="dir-btn ${dirClass}" data-flip-bend="${i}" title="Перевернуть направление (D)">${dirLabel}</button>
                                <button class="del-bend-btn" data-del-bend="${i}" title="Удалить гиб">✕</button>
                            </div>
                        </div>
                        <div class="input-group" style="margin-bottom:0;">
                            <div class="input-row">
                                <input type="number" id="bendAngle_${i}" value="${b.angle}" step="1" min="60" max="170" style="flex:0 0 85px; text-align:center;">
                                <input type="range" id="bendAngle_${i}Slider" min="60" max="170" step="1" value="${b.angle}">
                                <span style="font-size:0.8rem; color:#8b9bb5;">°</span>
                            </div>
                        </div>
                    </div>`;
                }
            }

            html += `<div class="add-btn-row">
                <button class="add-btn" id="addBendBtn">+ Гиб</button>
            </div>`;

            container.innerHTML = html;
            attachEditorEvents();
        }

        function attachEditorEvents() {
            document.querySelectorAll('#bendEditor input[type=range]').forEach(s => {
                s.addEventListener('input', e => {
                    const numId = e.target.id.replace('Slider', '');
                    const num = document.getElementById(numId);
                    const val = Math.round(parseFloat(e.target.value));
                    if (num) num.value = val;
                    if (numId.startsWith('seg_')) {
                        const idx = parseInt(numId.split('_')[1]);
                        if (!isNaN(idx) && segments[idx]) segments[idx].length = val;
                    } else if (numId.startsWith('bendAngle_')) {
                        const idx = parseInt(numId.split('_')[1]);
                        if (!isNaN(idx) && bends[idx]) bends[idx].angle = val;
                    }
                    redraw();
                });
            });
            document.querySelectorAll('#bendEditor input[type=number]').forEach(n => {
                n.addEventListener('input', e => {
                    const slider = document.getElementById(e.target.id + 'Slider');
                    if (slider) slider.value = e.target.value;

                    const id = e.target.id;
                    const val = parseFloat(e.target.value) || 0;
                    if (id.startsWith('seg_')) {
                        const idx = parseInt(id.split('_')[1]);
                        if (!isNaN(idx) && segments[idx]) segments[idx].length = val;
                    } else if (id.startsWith('bendAngle_')) {
                        const idx = parseInt(id.split('_')[1]);
                        if (!isNaN(idx) && bends[idx]) bends[idx].angle = val;
                    }
                    redraw();
                });
            });

            document.querySelectorAll('[data-flip-bend]').forEach(btn => {
                btn.addEventListener('click', e => {
                    const idx = parseInt(e.currentTarget.dataset.flipBend);
                    if (!isNaN(idx) && bends[idx]) {
                        bends[idx].direction *= -1;
                        updateBendEditor();
                        redraw();
                    }
                });
            });

            document.querySelectorAll('[data-del-bend]').forEach(btn => {
                btn.addEventListener('click', e => {
                    const idx = parseInt(e.currentTarget.dataset.delBend);
                    if (!isNaN(idx) && bends.length > 0) {
                        bends.splice(idx, 1);
                        const segIdx = idx + 1;
                        if (segIdx < segments.length && idx < segments.length - 1) {
                            segments[idx].length += segments[segIdx].length;
                            segments.splice(segIdx, 1);
                        } else if (segIdx < segments.length) {
                            segments.splice(segIdx, 1);
                        }
                        if (selectedBendIdx >= bends.length) selectedBendIdx = bends.length - 1;
                        updateBendEditor();
                        redraw();
                    }
                });
            });

            const addBend = document.getElementById('addBendBtn');
            if (addBend) addBend.addEventListener('click', () => {
                const lastDir = bends.length > 0 ? bends[bends.length - 1].direction : 1;
                bends.push({ angle: 90, direction: -lastDir });
                if (segments.length <= bends.length) {
                    segments.splice(segments.length - 1, 0, { length: 80 });
                }
                updateBendEditor();
                redraw();
            });

            document.querySelectorAll('#bendEditor .bend-item').forEach(el => {
                el.addEventListener('click', e => {
                    if (e.target.closest('.dir-btn') || e.target.closest('.del-bend-btn') || e.target.closest('input')) return;
                    selectedBendIdx = parseInt(el.dataset.bendIdx);
                    updateBendEditor();
                });
            });
        }

        function applyPreset(name) {
            document.querySelectorAll('#profilePresets .preset-btn').forEach(b => b.classList.remove('active-preset'));
            const btn = document.querySelector(`[data-preset="${name}"]`);
            if (btn) btn.classList.add('active-preset');

            if (name === 'angle') {
                segments = [{ length: 50 }, { length: 30 }];
                bends = [{ angle: 90, direction: 1 }];
            } else if (name === 'U') {
                segments = [{ length: 50 }, { length: 100 }, { length: 50 }];
                bends = [{ angle: 90, direction: 1 }, { angle: 90, direction: 1 }];
            } else if (name === 'Z') {
                segments = [{ length: 50 }, { length: 80 }, { length: 30 }];
                bends = [{ angle: 90, direction: -1 }, { angle: 90, direction: 1 }];
            } else if (name === 'korob') {
                segments = [{ length: 40 }, { length: 80 }, { length: 80 }, { length: 40 }];
                bends = [{ angle: 90, direction: 1 }, { angle: 90, direction: 1 }, { angle: 90, direction: 1 }];
            } else if (name === 'shlyapny') {
                segments = [{ length: 20 }, { length: 60 }, { length: 100 }, { length: 60 }, { length: 20 }];
                bends = [{ angle: 90, direction: -1 }, { angle: 90, direction: 1 }, { angle: 90, direction: 1 }, { angle: 90, direction: -1 }];
            } else if (name === 'shveller') {
                segments = [{ length: 20 }, { length: 60 }, { length: 100 }, { length: 60 }, { length: 20 }];
                bends = [{ angle: 90, direction: 1 }, { angle: 90, direction: 1 }, { angle: 90, direction: 1 }, { angle: 90, direction: 1 }];
            }
            selectedBendIdx = -1;
            updateBendEditor();
            redraw();
        }

        // ---------- ВИЗУАЛИЗАЦИЯ ----------
        let currentView = 'bent';
        let firstDrawDone = false;
        let resetViewOnSwitch = true;


        
        // ---------- THREE.JS 3D ВИЗУАЛИЗАЦИЯ ----------
        let scene, camera, renderer, controls, partGroup;
        let gridHelper;

        function initThreeJS() {
            const container = document.getElementById('drawingArea');
            const canvas = document.getElementById('threeCanvas');
            
            const w = container.clientWidth || 800;
            const h = container.clientHeight || 500;
            
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x060d16);
            
            camera = new THREE.PerspectiveCamera(45, w / h, 0.1, 10000);
            camera.position.set(100, 80, 150);
            
            renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true });
            renderer.setSize(w, h);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.screenSpacePanning = true;
            controls.minDistance = 20;
            controls.maxDistance = 500;
            
            const ambientLight = new THREE.AmbientLight(0x404060, 0.6);
            scene.add(ambientLight);
            
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
            dirLight.position.set(100, 200, 100);
            dirLight.castShadow = true;
            dirLight.shadow.mapSize.width = 2048;
            dirLight.shadow.mapSize.height = 2048;
            scene.add(dirLight);
            
            const fillLight = new THREE.DirectionalLight(0x6090ff, 0.3);
            fillLight.position.set(-100, 50, -100);
            scene.add(fillLight);
            
            gridHelper = new THREE.GridHelper(400, 40, 0x1a2a3a, 0x0d1520);
            gridHelper.position.y = 0;
            scene.add(gridHelper);
            
            partGroup = new THREE.Group();
            scene.add(partGroup);
            
            window.addEventListener('resize', onWindowResize);
            animate();
        }
        
        function onWindowResize() {
            const container = document.getElementById('drawingArea');
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        }
        
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        
        function clearPart() {
            while (partGroup.children.length > 0) {
                const child = partGroup.children[0];
                if (child.geometry) child.geometry.dispose();
                if (child.material) child.material.dispose();
                partGroup.remove(child);
            }
        }
        
        function drawBent3D(geom, dims) {
            clearPart();
            if (!geom || dims.segments.length === 0) return;
            
            const { S, R } = geom;
            const outerR = R + S;
            const bendGeom = geom.bends;
            const segs = dims.segments;
            const bd = dims.bends;
            
            const material = new THREE.MeshStandardMaterial({
                color: 0x4488cc,
                metalness: 0.4,
                roughness: 0.6,
                side: THREE.DoubleSide
            });
            
            const edgeMaterial = new THREE.LineBasicMaterial({ color: 0x88bbff, linewidth: 1 });
            
            const path3D = [];
            let currentAngle = 0;
            let cx = 0, cy = 0;
            
            const halfW = getBendLength() / 2;
            
            for (let i = 0; i < segs.length; i++) {
                let leftOSSB = 0, rightOSSB = 0;
                if (i < bendGeom.length) leftOSSB = bendGeom[i].OSSB;
                if (i > 0 && i - 1 < bendGeom.length) rightOSSB = bendGeom[i - 1].OSSB;
                const netLen = Math.max(0, segs[i].length - leftOSSB - rightOSSB);
                
                const startX = cx;
                const startY = cy;
                const endX = cx + netLen * Math.cos(currentAngle);
                const endY = cy + netLen * Math.sin(currentAngle);
                
                const segPoints = 8;
                for (let j = 0; j <= segPoints; j++) {
                    const t = j / segPoints;
                    path3D.push(new THREE.Vector3(
                        startX + (endX - startX) * t,
                        0,
                        startY + (endY - startY) * t
                    ));
                }
                
                cx = endX;
                cy = endY;
                
                if (i < bd.length) {
                    const bendAngle = bendGeom[i].bendAngleDeg * Math.PI / 180;
                    const dir = bd[i].direction;
                    const arcSegments = 16;
                    
                    const norm = currentAngle + dir * Math.PI / 2;
                    const centerX = cx + outerR * Math.cos(norm);
                    const centerY = cy + outerR * Math.sin(norm);
                    
                    const startArcAngle = Math.atan2(cy - centerY, cx - centerX);
                    
                    for (let j = 1; j <= arcSegments; j++) {
                        const t = j / arcSegments;
                        const arcAngle = startArcAngle + dir * bendAngle * t;
                        const px = centerX + outerR * Math.cos(arcAngle);
                        const py = centerY + outerR * Math.sin(arcAngle);
                        path3D.push(new THREE.Vector3(px, 0, py));
                    }
                    
                    currentAngle += dir * bendAngle;
                    cx = centerX + outerR * Math.cos(startArcAngle + dir * bendAngle);
                    cy = centerY + outerR * Math.sin(startArcAngle + dir * bendAngle);
                }
            }
            
            if (path3D.length < 2) return;
            
            const shape = new THREE.Shape();
            const halfThick = S / 2;
            
            const firstPt = path3D[0];
            const lastPt = path3D[path3D.length - 1];
            
            const extrudeSettings = {
                steps: 1,
                depth: S,
                bevelEnabled: false
            };
            
            const lineGeom = new THREE.BufferGeometry().setFromPoints(path3D);
            const line = new THREE.Line(lineGeom, new THREE.LineBasicMaterial({ color: 0xff8844, linewidth: 2 }));
            partGroup.add(line);
            
            for (let i = 0; i < path3D.length - 1; i++) {
                const p1 = path3D[i];
                const p2 = path3D[i + 1];
                
                const dx = p2.x - p1.x;
                const dz = p2.z - p1.z;
                const len = Math.sqrt(dx * dx + dz * dz);
                if (len < 0.001) continue;
                
                const nx = -dz / len;
                const nz = dx / len;
                
                const boxGeom = new THREE.BoxGeometry(len, S, S);
                const box = new THREE.Mesh(boxGeom, material);
                
                box.position.set(
                    (p1.x + p2.x) / 2,
                    0,
                    (p1.z + p2.z) / 2
                );
                
                const angle = Math.atan2(dz, dx);
                box.rotation.y = -angle;
                
                box.castShadow = true;
                box.receiveShadow = true;
                partGroup.add(box);
            }
            
            const center = new THREE.Vector3();
            const bbox = new THREE.Box3().setFromObject(partGroup);
            bbox.getCenter(center);
            controls.target.copy(center);
            camera.position.set(center.x + 80, center.y + 60, center.z + 100);
        }
        
        function drawFlat3D(geom, dims, totalLen) {
            clearPart();
            if (!geom || totalLen <= 0) return;
            
            const L_mm = getBendLength();
            const bendGeom = geom.bends;
            const segs = dims.segments;
            const bd = dims.bends;
            
            const material = new THREE.MeshStandardMaterial({
                color: 0x1e3b5c,
                metalness: 0.3,
                roughness: 0.7,
                side: THREE.DoubleSide
            });
            
            const totalW = totalLen;
            const totalH = L_mm;
            
            const shape = new THREE.Shape();
            shape.moveTo(-totalW / 2, -totalH / 2);
            shape.lineTo(totalW / 2, -totalH / 2);
            shape.lineTo(totalW / 2, totalH / 2);
            shape.lineTo(-totalW / 2, totalH / 2);
            shape.lineTo(-totalW / 2, -totalH / 2);
            
            const extrudeSettings = { depth: 0.5, bevelEnabled: false };
            const geomShape = new THREE.ExtrudeGeometry(shape, extrudeSettings);
            const mesh = new THREE.Mesh(geomShape, material);
            mesh.rotation.x = -Math.PI / 2;
            mesh.position.y = 0.5;
            partGroup.add(mesh);
            
            let xPos = -totalW / 2;
            const segWidths = [];
            
            for (let i = 0; i < segs.length; i++) {
                let leftOSSB = 0, rightOSSB = 0;
                if (i < bendGeom.length) leftOSSB = bendGeom[i].OSSB;
                if (i > 0 && i - 1 < bendGeom.length) rightOSSB = bendGeom[i - 1].OSSB;
                const netLen = Math.max(0, segs[i].length - leftOSSB - rightOSSB);
                segWidths.push(netLen);
                if (i < bends.length) {
                    segWidths.push(bendGeom[i].BA);
                }
            }
            
            const edgeMaterial = new THREE.LineBasicMaterial({ color: 0xf97316, linewidth: 2 });
            let xCursor = -totalW / 2;
            
            for (let i = 0; i < segWidths.length; i++) {
                const w = segWidths[i];
                const isBend = i % 2 === 1;
                
                if (isBend) {
                    const points = [
                        new THREE.Vector3(xCursor, 0.6, -totalH / 2),
                        new THREE.Vector3(xCursor, 0.6, totalH / 2),
                        new THREE.Vector3(xCursor + w, 0.6, totalH / 2),
                        new THREE.Vector3(xCursor + w, 0.6, -totalH / 2),
                        new THREE.Vector3(xCursor, 0.6, -totalH / 2)
                    ];
                    const lineGeom = new THREE.BufferGeometry().setFromPoints(points);
                    const rect = new THREE.Line(lineGeom, new THREE.LineBasicMaterial({ color: 0xf97316, linewidth: 2 }));
                    partGroup.add(rect);
                    
                    const fillShape = new THREE.Shape();
                    fillShape.moveTo(0, -totalH / 2);
                    fillShape.lineTo(w, -totalH / 2);
                    fillShape.lineTo(w, totalH / 2);
                    fillShape.lineTo(0, totalH / 2);
                    fillShape.lineTo(0, -totalH / 2);
                    const fillGeom = new THREE.ShapeGeometry(fillShape);
                    const fillMat = new THREE.MeshBasicMaterial({ color: 0xf97316, transparent: true, opacity: 0.15, side: THREE.DoubleSide });
                    const fillMesh = new THREE.Mesh(fillGeom, fillMat);
                    fillMesh.rotation.x = -Math.PI / 2;
                    fillMesh.position.set(xCursor + w / 2, 0.55, 0);
                    partGroup.add(fillMesh);
                }
                
                xCursor += w;
            }
            
            controls.target.set(0, 0, 0);
            camera.position.set(0, 150, 0);
            camera.lookAt(0, 0, 0);
        }

        function updateExplanation(geom, dims, totalLen) {
            const expl = document.getElementById('explanation');
            if (!geom || totalLen <= 0 || dims.segments.length === 0) { expl.innerHTML = ''; return; }
            const bendGeom = geom.bends;
            const lines = [];

            let formula = '📐 Развёртка = ';
            const parts = [];
            for (let i = 0; i < dims.segments.length; i++) {
                let leftOSSB = 0, rightOSSB = 0;
                if (i < bendGeom.length) leftOSSB = bendGeom[i].OSSB;
                if (i > 0 && i - 1 < bendGeom.length) rightOSSB = bendGeom[i - 1].OSSB;
                const netLen = dims.segments[i].length - leftOSSB - rightOSSB;
                parts.push(`${netLen.toFixed(2)}`);
                if (i < bendGeom.length) parts.push(`+ BA${i+1}(${bendGeom[i].BA.toFixed(2)})`);
            }
            formula += parts.join(' + ') + ` = ${totalLen.toFixed(2)} мм`;
            lines.push(formula);

            const totalBD = bendGeom.reduce((s, b) => s + b.BD, 0);
            const sumExt = dims.segments.reduce((s, seg) => s + seg.length, 0);
            lines.push(`➖ Σ внешних: ${sumExt.toFixed(2)} мм · Σ BD: ${totalBD.toFixed(2)} мм`);
            lines.push('');
            lines.push('📙 BD – вычет на гиб: BD = 2×OSSB − BA.');
            lines.push('📗 OSSB – внешний отступ от вершины угла до начала радиуса.');
            lines.push('📘 BA – длина дуги нейтрального слоя (с учётом пружинения).');
            lines.push('');
            lines.push('📏 Ввод размеров — по внешней стороне.');
            lines.push('📐 Развёртка = Σ внешних − Σ BD');
            expl.innerHTML = lines.join('<br>');
        }

        function updateInnerIndicators(geom, dims) {
            if (!geom) {
                for (let i = 0; i < 20; i++) {
                    const el = document.getElementById('inner_seg_' + i);
                    if (el) el.style.display = 'none';
                }
                return;
            }
            const rPlusS = geom.R + geom.S;
            const bendGeom = geom.bends;
            for (let i = 0; i < dims.segments.length; i++) {
                const el = document.getElementById('inner_seg_' + i);
                if (!el) continue;
                let leftOSSB = 0, rightOSSB = 0;
                if (i < bendGeom.length) leftOSSB = bendGeom[i].OSSB;
                if (i > 0 && i - 1 < bendGeom.length) rightOSSB = bendGeom[i - 1].OSSB;
                const inner = dims.segments[i].length - leftOSSB - rightOSSB;
                el.textContent = `внутр. ${inner.toFixed(1)}`;
                el.style.display = 'inline-block';
            }
        }

        // ---------- ЭКСПОРТ DXF ----------
        function createDxfLine(x1,y1,x2,y2,layer){ return `0\nLINE\n8\n${layer}\n10\n${x1.toFixed(3)}\n20\n${y1.toFixed(3)}\n30\n0.0\n11\n${x2.toFixed(3)}\n21\n${y2.toFixed(3)}\n31\n0.0\n`; }

        function exportToDXF() {
            const geom = calculateGeometry();
            const dims = getProfileDims();
            const totalLen = computeFlatLength(geom, dims);
            if (!geom || totalLen <= 0) { alert("Нет данных для экспорта!"); return; }
            const L_mm = getBendLength();
            let dxf = "0\nSECTION\n2\nENTITIES\n";
            dxf += createDxfLine(0,0,totalLen,0,"OUTLINE");
            dxf += createDxfLine(totalLen,0,totalLen,L_mm,"OUTLINE");
            dxf += createDxfLine(totalLen,L_mm,0,L_mm,"OUTLINE");
            dxf += createDxfLine(0,L_mm,0,0,"OUTLINE");

            const segs = [];
            const bendGeom = geom.bends;
            for (let i = 0; i < dims.segments.length; i++) {
                let leftOSSB = 0, rightOSSB = 0;
                if (i < bendGeom.length) leftOSSB = bendGeom[i].OSSB;
                if (i > 0 && i - 1 < bendGeom.length) rightOSSB = bendGeom[i - 1].OSSB;
                const netLen = Math.max(0, dims.segments[i].length - leftOSSB - rightOSSB);
                segs.push({ t: 's', w: netLen });
                if (i < bendGeom.length) segs.push({ t: 'b', w: bendGeom[i].BA });
            }

            let xPos = 0;
            segs.forEach(s => {
                if (s.t === 'b') {
                    dxf += createDxfLine(xPos,0,xPos,L_mm,"BEND_BOUNDARIES");
                    dxf += createDxfLine(xPos+s.w/2,0,xPos+s.w/2,L_mm,"BEND_CENTER");
                    dxf += createDxfLine(xPos+s.w,0,xPos+s.w,L_mm,"BEND_BOUNDARIES");
                }
                xPos += s.w;
            });
            dxf += "0\nENDSEC\n0\nEOF\n";
            const blob = new Blob([dxf],{type:"application/dxf"});
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = `durma_flat_${totalLen.toFixed(1)}x${L_mm}.dxf`;
            document.body.appendChild(link); link.click(); document.body.removeChild(link);
        }

        // ---------- СОХРАНЕНИЕ / ЗАГРУЗКА ----------
        const STORAGE_KEY = 'bender_profiles';

        function getProfiles() {
            try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
            catch(e) { return []; }
        }

        function saveProfiles(profiles) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(profiles));
        }

        function refreshProfilesList() {
            const profiles = getProfiles();
            const list = document.getElementById('profilesList');
            if (profiles.length === 0) {
                list.innerHTML = '<div style="font-size:0.75rem; color:#5c6e82; padding:0.3rem;">Нет сохранённых деталей</div>';
                return;
            }
            list.innerHTML = profiles.map((p, i) => {
                const date = p.savedAt ? new Date(p.savedAt).toLocaleDateString('ru-RU') : '';
                return `<div class="profile-item" data-profile-idx="${i}">
                    <span class="profile-item-name">${p.name}</span>
                    <span class="profile-item-date">${date}</span>
                </div>`;
            }).join('');

            list.querySelectorAll('.profile-item').forEach(el => {
                el.addEventListener('click', () => {
                    const idx = parseInt(el.dataset.profileIdx);
                    document.getElementById('profileName').value = profiles[idx].name;
                    document.querySelectorAll('.profile-item').forEach(e => e.classList.remove('selected'));
                    el.classList.add('selected');
                });
            });
        }

        function saveCurrentProfile() {
            const name = document.getElementById('profileName').value.trim();
            if (!name) { alert('Введите имя детали!'); return; }
            const profile = {
                name,
                material: getMaterialKey(),
                thickness: getThickness(),
                bendLength: getBendLength(),
                segments: deepCopySegments(),
                bends: deepCopyBends(),
                savedAt: new Date().toISOString()
            };
            const profiles = getProfiles();
            const existingIdx = profiles.findIndex(p => p.name === name);
            if (existingIdx >= 0) {
                if (!confirm(`Перезаписать "${name}"?`)) return;
                profiles[existingIdx] = profile;
            } else {
                profiles.push(profile);
            }
            saveProfiles(profiles);
            refreshProfilesList();
        }

        function loadSelectedProfile() {
            const profiles = getProfiles();
            const name = document.getElementById('profileName').value.trim();
            const profile = profiles.find(p => p.name === name);
            if (!profile) { alert('Деталь не найдена!'); return; }

            document.getElementById('material').value = profile.material || 'steel';
            document.getElementById('thickness').value = profile.thickness || 2;
            document.getElementById('thicknessSlider').value = profile.thickness || 2;
            document.getElementById('bendLength').value = profile.bendLength || 100;
            document.getElementById('bendLengthSlider').value = profile.bendLength || 100;

            segments = profile.segments.map(s => ({ length: s.length }));
            bends = profile.bends.map(b => ({ angle: b.angle, direction: b.direction }));
            selectedBendIdx = -1;
            manualDie = null;

            updateBendEditor();
            redraw();
        }

        function deleteSelectedProfile() {
            const name = document.getElementById('profileName').value.trim();
            if (!name) { alert('Выберите деталь для удаления!'); return; }
            const profiles = getProfiles();
            const idx = profiles.findIndex(p => p.name === name);
            if (idx < 0) { alert('Деталь не найдена!'); return; }
            if (!confirm(`Удалить "${name}"?`)) return;
            profiles.splice(idx, 1);
            saveProfiles(profiles);
            document.getElementById('profileName').value = '';
            refreshProfilesList();
        }

        // ---------- ОСНОВНОЙ ЦИКЛ ----------
        function redraw() {
            const geom = calculateGeometry();
            const dims = getProfileDims();
            const totalLen = computeFlatLength(geom, dims);
            const totalBD = geom ? geom.bends.reduce((s,b) => s + b.BD, 0) : 0;
            const L_mm = getBendLength();
            let forceTon = 0, forceKN = 0, forcePerMeter = 0;
            if (geom && totalLen > 0) {
                const Rm = materialData[geom.matKey].Rm;
                const extAngles = getExternalAngles();
                const avgFactor = extAngles.length > 0 ? extAngles.reduce((s,a) => s + getAngleForceFactor(a), 0) / extAngles.length : 1;
                const forceN = (1.3 * Rm * L_mm * geom.S * geom.S) / geom.V * avgFactor;
                forceKN = forceN / 1000;
                forceTon = forceKN / 9.80665;
                forcePerMeter = forceKN / (L_mm / 1000);
            }
            document.getElementById('resRadius').textContent = geom ? geom.R.toFixed(2) : '--';
            document.getElementById('resK').textContent = geom ? geom.K.toFixed(3) : '--';
            document.getElementById('resBD').textContent = totalBD > 0 ? totalBD.toFixed(3) : '--';
            document.getElementById('resLength').textContent = totalLen > 0 ? totalLen.toFixed(2) : '--';
            document.getElementById('resForce').textContent = forceTon > 0 ? `${forceTon.toFixed(1)} т` : '--';

            const messages = validate(geom, dims, forceKN, forceTon, forcePerMeter);
            const warnDiv = document.getElementById('warningBox');
            if (messages.length) {
                warnDiv.innerHTML = messages.map(m => {
                    let t = m.text;
                    if (m.fixes) m.fixes.forEach(f => {
                        if (f.field) t = t.replace(f.match, `<span class="fix-link" data-field="${f.field}" data-value="${f.target}">${f.match}</span>`);
                    });
                    return t;
                }).join(' · ');
                warnDiv.classList.add('warning-active');
            } else {
                warnDiv.innerHTML = ''; warnDiv.classList.remove('warning-active');
            }

            updateExplanation(geom, dims, totalLen);
            updateInnerIndicators(geom, dims);
            controls.update();
        }

        function resetManualDie() { manualDie = null; }

        // ---------- ПРИВЯЗКА СОБЫТИЙ ----------
        document.getElementById('warningBox').addEventListener('click', e => {
            if (e.target.classList.contains('fix-link')) {
                const field = e.target.dataset.field;
                const value = parseFloat(e.target.dataset.value);
                if (field && !isNaN(value)) {
                    if (field.startsWith('seg_')) {
                        const idx = parseInt(field.split('_')[1]);
                        if (!isNaN(idx) && segments[idx]) {
                            segments[idx].length = value;
                            const inp = document.getElementById(field);
                            const slider = document.getElementById(field + 'Slider');
                            if (inp) { inp.value = Math.round(value); if (slider) slider.value = value; }
                            redraw();
                        }
                    }
                }
            }
        });

        document.querySelectorAll('#thicknessPresets .preset-btn').forEach(b => {
            b.addEventListener('click', () => {
                const v = parseFloat(b.dataset.thickness);
                document.getElementById('thickness').value = v;
                document.getElementById('thicknessSlider').value = v;
                resetManualDie(); redraw();
            });
        });

        document.querySelectorAll('#materialPresets .mat-btn').forEach(b => {
            b.addEventListener('click', () => {
                document.querySelectorAll('#materialPresets .mat-btn').forEach(x => x.classList.remove('active-preset'));
                b.classList.add('active-preset');
                document.getElementById('material').value = b.dataset.material;
                resetManualDie(); redraw();
            });
        });

        document.querySelectorAll('#profilePresets .preset-btn').forEach(b => {
            b.addEventListener('click', () => {
                applyPreset(b.dataset.preset);
            });
        });

        document.getElementById('flatViewBtn').addEventListener('click', () => {
            currentView = 'flat'; document.getElementById('flatViewBtn').classList.add('active');
            document.getElementById('bentViewBtn').classList.remove('active');
            resetViewOnSwitch = true; redraw();
        });
        document.getElementById('bentViewBtn').addEventListener('click', () => {
            currentView = 'bent'; document.getElementById('bentViewBtn').classList.add('active');
            document.getElementById('flatViewBtn').classList.remove('active');
            resetViewOnSwitch = true; redraw();
        });

        document.getElementById('thickness').addEventListener('input', () => {
            let v = parseFloat(document.getElementById('thickness').value);
            if (v > 7) v = 7; if (v < 0.5) v = 0.5;
            document.getElementById('thickness').value = v;
            document.getElementById('thicknessSlider').value = v;
            resetManualDie(); redraw();
        });
        document.getElementById('thicknessSlider').addEventListener('input', () => {
            const v = parseFloat(document.getElementById('thicknessSlider').value);
            document.getElementById('thickness').value = v.toFixed(1);
            resetManualDie(); redraw();
        });
        document.getElementById('bendLength').addEventListener('input', () => {
            let v = parseFloat(document.getElementById('bendLength').value);
            if (v > 4150) v = 4150; if (v < 10) v = 10;
            document.getElementById('bendLength').value = v;
            document.getElementById('bendLengthSlider').value = v;
            redraw();
        });
        document.getElementById('bendLengthSlider').addEventListener('input', () => {
            document.getElementById('bendLength').value = document.getElementById('bendLengthSlider').value;
            redraw();
        });
        document.getElementById('material').addEventListener('change', () => { resetManualDie(); redraw(); });
        document.getElementById('resDieSelect').addEventListener('change', (e) => { manualDie = parseInt(e.target.value); redraw(); });
        document.getElementById('btnExportDxf').addEventListener('click', exportToDXF);

        document.getElementById('saveBtn').addEventListener('click', saveCurrentProfile);
        document.getElementById('loadBtn').addEventListener('click', loadSelectedProfile);
        document.getElementById('deleteBtn').addEventListener('click', deleteSelectedProfile);


        document.getElementById('zoomInBtn').addEventListener('click', () => { camera.position.multiplyScalar(0.85); controls.update(); });
        document.getElementById('resetViewBtn').addEventListener('click', () => { camera.position.set(100, 80, 150); controls.target.set(0, 0, 0); controls.update(); });

        // ---------- INIT ----------
        updateBendEditor();
        refreshProfilesList();
        initThreeJS();
        redraw();
    })();
</script>
